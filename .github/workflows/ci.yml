name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  smoke:
    name: Smoke test (forward pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Tokenizer smoke test
        run: |
          python - <<'EOF'
          from chesstf.data.tokenizer import ChessTokenizer
          tok = ChessTokenizer()
          tok.build_vocab([["e4", "e5", "Nf3", "Nc6"]])
          ids = tok.encode(["e4", "e5"], add_special=True)
          assert ids[0] == 1 and ids[-1] == 2, f"unexpected ids: {ids}"
          print("Tokenizer smoke test passed.")
          EOF

      - name: Process CLI help
        run: python -m chesstf.data.process --help
